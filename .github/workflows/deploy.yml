name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            anime-site/package-lock.json
            server/package-lock.json

      - name: Build frontend
        working-directory: anime-site
        run: |
          npm ci
          npm run build

      - name: Build backend
        working-directory: server
        run: |
          npm ci
          npm run build

      - name: Prepare artifact
        run: |
          mkdir -p artifact/anime-site
          mkdir -p artifact/server
          cp -r anime-site/dist artifact/anime-site/
          cp -r server/dist artifact/server/
          cp server/package.json server/package-lock.json artifact/server/

      - uses: actions/upload-artifact@v4
        with:
          name: deploy
          path: artifact/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy
          path: artifact/

      - name: Copy files to server
        uses: appleboy/scp-action@v0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: artifact/*
          target: /root/qik-anime/
          strip_components: 1
          rm: true

      - name: Reload app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cp -r /root/qik-anime/anime-site/dist/* /var/www/quickik.ru/
            cd /root/qik-anime/server
            npm ci --omit=dev
            pm2 reload anime-api
            echo "ok"
