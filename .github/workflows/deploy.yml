name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            anime-site/package-lock.json
            server/package-lock.json

      - name: Build frontend
        working-directory: anime-site
        run: |
          npm ci
          npm run build

      - name: Build backend
        working-directory: server
        run: |
          npm ci
          npm run build

      - name: Prepare artifact
        run: |
          mkdir -p artifact/anime-site
          mkdir -p artifact/server
          cp -r anime-site/dist artifact/anime-site/
          cp -r server/dist artifact/server/
          cp server/package.json server/package-lock.json artifact/server/

      - uses: actions/upload-artifact@v4
        with:
          name: deploy
          path: artifact/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy
          path: artifact/

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -e
          mkdir -p ~/.ssh

          echo "$SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/deploy_key -p $SSH_PORT"

          echo "--- backup db ---"
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" 'cp /root/qik-anime/server/data/qik-anime.db /root/qik-anime/server/data/qik-anime.db.bak 2>/dev/null; echo ok'

          echo "--- rsync ---"
          rsync -rlgoDzvc -e "ssh $SSH_OPTS" --exclude='server/data/' --exclude='server/uploads/' artifact/ "$SSH_USER@$SSH_HOST:/root/qik-anime/"

          echo "--- reload ---"
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" 'cp -r /root/qik-anime/anime-site/dist/* /var/www/quickik.ru/ && cd /root/qik-anime/server && npm ci --omit=dev && pm2 restart ecosystem.config.cjs --update-env && echo ok'
