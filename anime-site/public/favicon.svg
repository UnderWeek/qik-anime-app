<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Темный контрастный фон -->
    <radialGradient id="bg-grad-alt" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#141923" />
      <stop offset="100%" stop-color="#080a0e" />
    </radialGradient>

    <!-- Улучшенный неоновый градиент для лезвия -->
    <linearGradient id="blade-grad-alt" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#581c87" />  <!-- Темно-пурпурный у рукояти -->
      <stop offset="25%" stop-color="#7c3aed" /> <!-- Насыщенный фиолетовый -->
      <stop offset="55%" stop-color="#2563eb" /> <!-- Ультрамарин (синий) -->
      <stop offset="85%" stop-color="#06b6d4" /> <!-- Бирюзовый -->
      <stop offset="100%" stop-color="#34d399" /> <!-- Мятный неоновый кончик -->
    </linearGradient>

    <!-- Градиент для каллиграфического хвоста -->
    <linearGradient id="tail-grad-alt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9" />
      <stop offset="40%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Свечение для лезвия -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Фильтр мазка сухой кисти для кольца -->
    <filter id="brush-alt" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="500" height="500" fill="url(#bg-grad-alt)" />

  <!-- Задняя часть белого кольца (для эффекта прохождения сквозь него) -->
  <g filter="url(#brush-alt)">
    <!-- Верхняя половина кольца (катана пройдет под ней) -->
    <path d="M 330,160 A 115,115 0 0, 0 160,300" fill="none" stroke="#ffffff" stroke-width="44" stroke-linecap="round" />
    <path d="M 335,170 A 112,112 0 0, 0 180,310" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.6" />
  </g>

  <!-- Катана (направлена под более агрессивным углом) -->
  <g transform="translate(250, 250) rotate(215)">
    <!-- Тень под лезвием для отделения от кольца -->
    <path d="M -6,70 Q -6,-60 -21,-205 Q 6,-60 6,70 Z" fill="#000000" opacity="0.4" transform="translate(4, 4)" />

    <!-- Лезвие с неоновым градиентом -->
    <path d="M -5,70 Q -5,-60 -20,-200 Q 5,-60 5,70 Z" fill="url(#blade-grad-alt)" filter="url(#neon-glow)" />
    
    <!-- Белая линия лезвия (блик хамона) -->
    <path d="M -19,-190 Q 3,-58 3,68" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.85" />

    <!-- Хабаки -->
    <rect x="-5" y="70" width="10" height="9" fill="#ffffff" />

    <!-- Цуба (Гарда в японском стиле) -->
    <rect x="-18" y="79" width="36" height="8" rx="3" fill="#ffffff" />

    <!-- Рукоять -->
    <rect x="-6" y="87" width="12" height="80" rx="2" fill="#ffffff" />

    <!-- Текстура обмотки рукояти (прорези) -->
    <g fill="#141923">
      <path d="M 0,93 L 3.5,98 L 0,103 L -3.5,98 Z" />
      <path d="M 0,109 L 3.5,114 L 0,119 L -3.5,114 Z" />
      <path d="M 0,125 L 3.5,130 L 0,135 L -3.5,130 Z" />
      <path d="M 0,141 L 3.5,146 L 0,151 L -3.5,146 Z" />
      <path d="M 0,157 L 3.5,162 L 0,167 L -3.5,162 Z" />
    </g>

    <!-- Касира (навершие) -->
    <path d="M -6,167 L 6,167 L 4,172 L -4,172 Z" fill="#ffffff" />
  </g>

  <!-- Передняя часть кольца и летящие осколки/брызги -->
  <g filter="url(#brush-alt)">
    <!-- Нижняя правая часть кольца (перекрывает катану сверху) -->
    <path d="M 160,300 A 115,115 0 0, 0 330,340" fill="none" stroke="#ffffff" stroke-width="44" stroke-linecap="round" />
    <path d="M 150,290 A 118,118 0 0, 0 310,350" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.5" />
    
    <!-- Динамичный хвост Q -->
    <path d="M 200,310 
             C 215,290 250,320 280,345 
             C 320,380 375,415 425,395 
             C 370,395 325,360 295,325 
             C 270,295 225,275 200,310 Z" 
          fill="url(#tail-grad-alt)" />
  </g>

  <!-- Осколки краски/энергии от удара меча -->
  <g fill="#ffffff">
    <!-- Острые щепки краски на пересечении лезвия и кольца -->
    <polygon points="175,280 165,290 180,295" opacity="0.9" />
    <polygon points="295,190 310,180 300,195" opacity="0.9" />
    <polygon points="190,320 180,335 195,330" opacity="0.8" />
    <polygon points="310,155 320,165 325,150" opacity="0.8" />
    
    <!-- Мелкие капли -->
    <circle cx="150" cy="325" r="3" opacity="0.7" />
    <circle cx="335" cy="135" r="2.5" opacity="0.7" />
    <circle cx="355" cy="180" r="2" opacity="0.5" />
    <circle cx="130" cy="270" r="1.5" opacity="0.6" />
  </g>
</svg>