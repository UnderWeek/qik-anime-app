# Nginx reference config for quickik.ru
# Optimized for Core Web Vitals (LCP, INP, CLS)
# Includes bot detection + prerender proxy for SPA SEO

# Upstream: prerender service (Puppeteer, optional)
# Uncomment when prerender is deployed:
# upstream prerender {
#     server 127.0.0.1:3002;
# }

server {
    listen 80;
    server_name quickik.ru www.quickik.ru;
    return 301 https://quickik.ru$request_uri;
}

server {
    listen 443 ssl http2;
    server_name quickik.ru;

    root /var/www/quickik.ru;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (socket.io)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static assets: long cache (fingerprinted filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — serve index.html for all routes
    location / {
        # Prerender: detect bots and proxy to prerender service
        # Uncomment when prerender is deployed (server/prerender):
        #
        # set $prerender 0;
        # if ($http_user_agent ~* "googlebot|yandex|bingbot|duckduckbot|facebot|twitterbot|telegrambot|whatsapp|slack|discord|baiduspider|petalbot|ahrefsbot|semrush") {
        #     set $prerender 1;
        # }
        # if ($args ~* "_escaped_fragment_=") {
        #     set $prerender 1;
        # }
        # if ($prerender = 1) {
        #     proxy_pass http://prerender;
        #     break;
        # }

        try_files $uri $uri/ /index.html;

        # HTML: no cache
        location = /index.html {
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }

        # Sitemap & robots
        location = /sitemap.xml {
            add_header Content-Type "application/xml";
        }
        location = /robots.txt {
            add_header Content-Type "text/plain";
        }
    }

    # MIME types with correct charset
    charset utf-8;
    types {
        text/html html htm;
        text/css css;
        text/javascript js mjs;
        application/javascript js mjs;
        image/svg+xml svg;
        image/png png;
        image/jpeg jpg jpeg;
        image/webp webp;
        image/avif avif;
        font/woff2 woff2;
        application/json json;
        application/xml xml;
        text/plain txt;
    }
}
